<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Network Setup</title>
    <link rel="stylesheet" href="style.css">
    <style>
        header {
            background: linear-gradient(135deg, #3c65a4 0%, #2f4f7f 100%);
            color: white;
            padding: 2rem 1rem;
            border-radius: 16px;
            margin-bottom: 2rem;
        }
        header h1 {
            margin: 0 0 1rem 0;
            font-size: 2rem;
        }
        .link-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }
        .link-bar a {
            padding: 0.6rem 1rem;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .link-bar a:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .page {
            width: min(100%, 1200px);
            margin: 0 auto;
            padding: 1rem;
        }
        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #31415a;
        }
        .button-bar {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }
        .save-button {
            min-width: 200px;
            padding: 1rem;
            font-size: 1.1rem;
            background: #27ae60;
        }
        .save-button:hover {
            background: #229954;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .checkbox-group input[type="checkbox"] {
            width: auto;
            min-height: 20px;
        }
    </style>
</head>

<body>
    <div class="page">
        <header>
            <h1>&nbsp;&#9881; Network & Module Setup</h1>
            <p style="margin: 0; opacity: 0.9;">Configure WiFi, network, and module settings</p>
            <div class="link-bar">
                <a href="/">&larr; Back to Dashboard</a>
                <a href="/firmware" target="_blank">&nbsp;&#128230; Firmware</a>
                <a href="/help" target="_blank">&nbsp;&#10067; Help</a>
                <a href="/restart" target="_blank">&nbsp;&#128260; Restart</a>
                <a href="/reset" target="_blank">&nbsp;&#128260; WiFi Reset</a>
            </div>
        </header>

        <form id="Network" action="/setSetup" method="get">
            <div class="section-grid">
                <!-- WiFi Configuration -->
                <div class="card">
                    <h2>&nbsp;&#128225; WiFi Configuration</h2>
                    <div class="form-group">
                        <label for="ssid">Network Name (SSID)</label>
                        <input type="text" id="ssid" name="ssid" required placeholder="Enter WiFi network name">
                    </div>
                    <div class="form-group">
                        <label for="password">WiFi Password</label>
                        <input type="password" id="password" name="password" required placeholder="Enter WiFi password">
                    </div>
                </div>

                <!-- Module Network Parameters -->
                <div class="card">
                    <h2>&nbsp;&#127760; Network Parameters</h2>
                    <div class="form-group">
                        <div class="checkbox-group">
                            <input type="checkbox" id="dynamicIP" name="dynamicIP" value="active">
                            <label for="dynamicIP" style="margin-bottom: 0;">Use Dynamic IP (DHCP)</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="routerIP">Router IP Address</label>
                        <input type="text" id="routerIP" name="routerIP" placeholder="192.168.1.1">
                    </div>
                    <div class="form-group">
                        <label for="IP">Module Static IP</label>
                        <input type="text" id="IP" name="IP" required placeholder="192.168.1.100">
                    </div>
                </div>

                <!-- Module Identity -->
                <div class="card">
                    <h2>&nbsp;&#128721; Module Identity</h2>
                    <div class="form-group">
                        <label for="moduleName">Module Name</label>
                        <input type="text" id="moduleName" name="moduleName" required placeholder="e.g., Trappe-01">
                    </div>
                    <div class="form-group">
                        <label for="mdns">mDNS Hostname</label>
                        <input type="text" id="mdns" name="mdns" required placeholder="e.g., trappe" help="Used for local network discovery">
                    </div>
                    <div class="form-group">
                        <label for="mdnsAP">mDNS AP Hostname</label>
                        <input type="text" id="mdnsAP" name="mdnsAP" required placeholder="e.g., trappe-ap">
                    </div>
                </div>

                <!-- IoT Security -->
                <div class="card">
                    <h2>&nbsp;&#128274; IoT Security Keys</h2>
                    <div class="form-group">
                        <label for="privateKey">Private Key</label>
                        <input type="text" id="privateKey" name="privateKey" placeholder="Your private key">
                    </div>
                    <div class="form-group">
                        <label for="publicKey">Public Key</label>
                        <input type="text" id="publicKey" name="publicKey" placeholder="Your public key">
                    </div>
                </div>
            </div>

            <div class="button-bar">
                <button type="submit" class="save-button">&nbsp;&#128190; Save Configuration</button>
            </div>
        </form>
    </div>
	<script>
function update(responseText) {
				var myObj = JSON.parse(responseText);
				document.getElementsByName("ssid")[0].value = myObj.ssid;
				document.getElementsByName("password")[0].value = myObj.password;
				//if (document.getElementsByName("DynamicIP")[0].value = myObj.DynamicIP == "active") 
				document.getElementsByName("dynamicIP")[0].checked = myObj.dynamicIP==1;
				document.getElementsByName("routerIP")[0].value = myObj.routerIP;
				document.getElementsByName("IP")[0].value = myObj.IP;

				document.getElementsByName("moduleName")[0].value = myObj.moduleName;
				document.getElementsByName("mdns")[0].value = myObj.mdns;
				document.getElementsByName("mdnsAP")[0].value = myObj.mdnsAP;

				document.getElementsByName("publicKey")[0].value = myObj.publicKey;
				document.getElementsByName("privateKey")[0].value = myObj.privateKey;
	}
		

function init() {
				var xhttp = new XMLHttpRequest();
				xhttp.onreadystatechange = function() {
					if (this.readyState == 4 && this.status == 200) {
						update(this.responseText)
					}
				};

				xhttp.open("GET", "jsonSetup", true);
				xhttp.send();
			}
			window.onload = init;
	</script>
</body>

</html>
